name: CI/CD Pipeline - Deploy to Amazon EKS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
  EKS_NAMESPACE: ${{ secrets.EKS_NAMESPACE }}
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

jobs:
  build:
    name: Build & Push Docker Images to ECR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build imagen Frontend
        run: docker build -t rentca-frontend ./frontend

      - name: Tag y Push imagen Frontend a ECR
        run: |
          docker tag rentca-frontend:latest $ECR_REGISTRY/rentca-frontend:latest
          docker tag rentca-frontend:latest $ECR_REGISTRY/rentca-frontend:${{ github.sha }}
          docker push $ECR_REGISTRY/rentca-frontend:latest
          docker push $ECR_REGISTRY/rentca-frontend:${{ github.sha }}

      - name: Build imagen Backend
        run: docker build -t rentca-backend ./backend

      - name: Tag y Push imagen Backend a ECR
        run: |
          docker tag rentca-backend:latest $ECR_REGISTRY/rentca-backend:latest
          docker tag rentca-backend:latest $ECR_REGISTRY/rentca-backend:${{ github.sha }}
          docker push $ECR_REGISTRY/rentca-backend:latest
          docker push $ECR_REGISTRY/rentca-backend:${{ github.sha }}

  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Configurar kubectl para EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name ${{ secrets.EKS_CLUSTER_NAME }}

      - name: Crear namespace si no existe
        run: |
          kubectl get namespace ${{ secrets.EKS_NAMESPACE }} || \
          kubectl create namespace ${{ secrets.EKS_NAMESPACE }}

      - name: Actualizar imagen en manifests
        run: |
          ECR_REGISTRY=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
          sed -i "s|IMAGE_FRONTEND|$ECR_REGISTRY/rentca-frontend:${{ github.sha }}|g" k8s/frontend-deployment.yml
          sed -i "s|IMAGE_BACKEND|$ECR_REGISTRY/rentca-backend:${{ github.sha }}|g" k8s/backend-deployment.yml

      - name: Aplicar manifests de Kubernetes
        run: kubectl apply -f k8s/ -n ${{ secrets.EKS_NAMESPACE }}

      - name: Esperar rollout Frontend
        run: kubectl rollout status deployment/rentca-frontend -n ${{ secrets.EKS_NAMESPACE }} --timeout=120s

      - name: Esperar rollout Backend
        run: kubectl rollout status deployment/rentca-backend -n ${{ secrets.EKS_NAMESPACE }} --timeout=120s

      - name: Ver pods desplegados
        run: |
          kubectl get pods -n ${{ secrets.EKS_NAMESPACE }}
          kubectl get services -n ${{ secrets.EKS_NAMESPACE }}