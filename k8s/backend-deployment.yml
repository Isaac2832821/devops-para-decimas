apiVersion: apps/v1
kind: Deployment
metadata:
  name: rentca-backend
  labels:
    app: rentca-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rentca-backend
  template:
    metadata:
      labels:
        app: rentca-backend
    spec:
      containers:
        - name: rentca-backend
          image: IMAGE_BACKEND
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: rentca-backend-service
spec:
  type: ClusterIP
  selector:
    app: rentca-backend
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000