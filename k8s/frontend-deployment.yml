apiVersion: apps/v1
kind: Deployment
metadata:
  name: rentca-frontend
  labels:
    app: rentca-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rentca-frontend
  template:
    metadata:
      labels:
        app: rentca-frontend
    spec:
      containers:
        - name: rentca-frontend
          image: IMAGE_FRONTEND
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: rentca-frontend-service
spec:
  type: LoadBalancer
  selector:
    app: rentca-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80